apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: calendar-sync-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: calendar-sync.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: calendar-sync-web
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: calendar-sync-api
                port:
                  number: 4200

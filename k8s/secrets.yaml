apiVersion: v1
kind: Secret
metadata:
  name: calendar-sync-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql://calendar_sync:CHANGE_ME@postgres:5432/calendar_sync"
  DB_PASSWORD: "CHANGE_ME"
  REDIS_URL: "redis://redis:6379"
  NEXTAUTH_SECRET: "CHANGE_ME"
  ENCRYPTION_SECRET: "CHANGE_ME_32_BYTE_HEX_KEY"
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  GOOGLE_CALENDAR_CLIENT_ID: ""
  GOOGLE_CALENDAR_CLIENT_SECRET: ""
  MICROSOFT_CLIENT_ID: ""
  MICROSOFT_CLIENT_SECRET: ""
  MICROSOFT_TENANT_ID: "common"
  MICROSOFT_CALENDAR_CLIENT_ID: ""
  MICROSOFT_CALENDAR_CLIENT_SECRET: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: calendar-sync-config
data:
  NEXTAUTH_URL: "https://calendar-sync.example.com"
  API_INTERNAL_URL: "http://calendar-sync-api:4200"
  API_PORT: "4200"
  API_HOST: "0.0.0.0"

services:
  api:
    build:
      context: .
      dockerfile: dev.Dockerfile
      target: ""
    volumes:
      - ./packages/backend/src:/app/packages/backend/src
      - ./packages/backend/prisma:/app/packages/backend/prisma
    command: sh -c "cd /app/packages/backend && npx prisma db push --skip-generate && npx tsx watch src/server.ts"
    environment:
      NODE_ENV: development

  sync-worker:
    build:
      context: .
      dockerfile: dev.Dockerfile
      target: ""
    volumes:
      - ./packages/backend/src:/app/packages/backend/src
      - ./packages/backend/prisma:/app/packages/backend/prisma
    command: sh -c "cd /app/packages/backend && npx tsx watch src/worker.ts"
    environment:
      NODE_ENV: development

  web:
    build:
      context: .
      dockerfile: dev.Dockerfile
    volumes:
      - ./packages/web/src:/app/packages/web/src
      - ./packages/web/public:/app/packages/web/public
    command: sh -c "cd /app/packages/web && npx next dev -p 3000"
    environment:
      NODE_ENV: development

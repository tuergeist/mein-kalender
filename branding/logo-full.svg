<svg width="680" height="340" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
  <!-- mein-kalender.link — Full Logo (Light Background) -->

  <!-- Calendar page 3 (furthest back, teal) -->
  <g transform="translate(240, 60)">
    <rect x="0" y="0" width="160" height="180" rx="12" fill="#5DCAA5" opacity="0.35"/>
    <rect x="0" y="0" width="160" height="40" rx="12" fill="#1D9E75" opacity="0.4"/>
    <rect x="0" y="28" width="160" height="12" fill="#1D9E75" opacity="0.4"/>
    <circle cx="40" cy="80" r="5" fill="#1D9E75" opacity="0.3"/>
    <circle cx="80" cy="80" r="5" fill="#1D9E75" opacity="0.3"/>
    <circle cx="120" cy="80" r="5" fill="#1D9E75" opacity="0.3"/>
    <circle cx="40" cy="110" r="5" fill="#1D9E75" opacity="0.3"/>
    <circle cx="80" cy="110" r="5" fill="#1D9E75" opacity="0.3"/>
  </g>

  <!-- Calendar page 2 (middle, blue) -->
  <g transform="translate(260, 48)">
    <rect x="0" y="0" width="160" height="180" rx="12" fill="#85B7EB" opacity="0.5"/>
    <rect x="0" y="0" width="160" height="40" rx="12" fill="#378ADD" opacity="0.55"/>
    <rect x="0" y="28" width="160" height="12" fill="#378ADD" opacity="0.55"/>
    <circle cx="40" cy="80" r="5" fill="#378ADD" opacity="0.4"/>
    <circle cx="80" cy="80" r="5" fill="#378ADD" opacity="0.4"/>
    <circle cx="120" cy="80" r="5" fill="#378ADD" opacity="0.4"/>
    <circle cx="40" cy="110" r="5" fill="#378ADD" opacity="0.4"/>
    <circle cx="80" cy="110" r="5" fill="#378ADD" opacity="0.4"/>
    <circle cx="120" cy="110" r="5" fill="#378ADD" opacity="0.4"/>
  </g>

  <!-- Calendar page 1 (front, purple — primary) -->
  <g transform="translate(280, 36)">
    <rect x="0" y="0" width="160" height="180" rx="12" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
    <rect x="0" y="0" width="160" height="40" rx="12" fill="#7F77DD"/>
    <rect x="0" y="28" width="160" height="12" fill="#7F77DD"/>
    <circle cx="50" cy="4" r="6" fill="none" stroke="#534AB7" stroke-width="2"/>
    <circle cx="110" cy="4" r="6" fill="none" stroke="#534AB7" stroke-width="2"/>
    <circle cx="40" cy="72" r="5.5" fill="#AFA9EC"/>
    <circle cx="80" cy="72" r="5.5" fill="#AFA9EC"/>
    <circle cx="120" cy="72" r="5.5" fill="#AFA9EC"/>
    <circle cx="40" cy="102" r="5.5" fill="#AFA9EC"/>
    <circle cx="80" cy="102" r="5.5" fill="#7F77DD"/>
    <circle cx="120" cy="102" r="5.5" fill="#AFA9EC"/>
    <circle cx="40" cy="132" r="5.5" fill="#AFA9EC"/>
    <circle cx="80" cy="132" r="5.5" fill="#AFA9EC"/>
    <circle cx="120" cy="132" r="5.5" fill="#AFA9EC"/>
    <circle cx="80" cy="102" r="12" fill="none" stroke="#534AB7" stroke-width="1.5"/>
  </g>

  <!-- Booking checkmark badge -->
  <g transform="translate(418, 170)">
    <circle cx="0" cy="0" r="22" fill="#1D9E75"/>
    <path d="M-10 0L-3 7L10 -6" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="340" y="278" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="600" fill="#2C2C2A" letter-spacing="-0.5px">mein-kalender<tspan fill="#7F77DD" font-weight="600">.link</tspan></text>

  <!-- Tagline -->
  <text x="340" y="308" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="400" fill="#888780" letter-spacing="2px">CONSOLIDATE · COPY · BOOK</text>
</svg>

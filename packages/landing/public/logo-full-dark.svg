<svg width="680" height="340" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
  <!-- mein-kalender.link — Full Logo (Dark Background) -->
  <rect x="0" y="0" width="680" height="340" rx="16" fill="#1A1A1E"/>

  <!-- Calendar page 3 (teal, back) -->
  <g transform="translate(240, 60)">
    <rect x="0" y="0" width="160" height="180" rx="12" fill="#085041" opacity="0.6"/>
    <rect x="0" y="0" width="160" height="40" rx="12" fill="#0F6E56" opacity="0.6"/>
    <rect x="0" y="28" width="160" height="12" fill="#0F6E56" opacity="0.6"/>
    <circle cx="40" cy="80" r="5" fill="#5DCAA5" opacity="0.25"/>
    <circle cx="80" cy="80" r="5" fill="#5DCAA5" opacity="0.25"/>
    <circle cx="120" cy="80" r="5" fill="#5DCAA5" opacity="0.25"/>
    <circle cx="40" cy="110" r="5" fill="#5DCAA5" opacity="0.25"/>
    <circle cx="80" cy="110" r="5" fill="#5DCAA5" opacity="0.25"/>
  </g>

  <!-- Calendar page 2 (blue, middle) -->
  <g transform="translate(260, 48)">
    <rect x="0" y="0" width="160" height="180" rx="12" fill="#0C447C" opacity="0.7"/>
    <rect x="0" y="0" width="160" height="40" rx="12" fill="#185FA5" opacity="0.7"/>
    <rect x="0" y="28" width="160" height="12" fill="#185FA5" opacity="0.7"/>
    <circle cx="40" cy="80" r="5" fill="#85B7EB" opacity="0.3"/>
    <circle cx="80" cy="80" r="5" fill="#85B7EB" opacity="0.3"/>
    <circle cx="120" cy="80" r="5" fill="#85B7EB" opacity="0.3"/>
    <circle cx="40" cy="110" r="5" fill="#85B7EB" opacity="0.3"/>
    <circle cx="80" cy="110" r="5" fill="#85B7EB" opacity="0.3"/>
    <circle cx="120" cy="110" r="5" fill="#85B7EB" opacity="0.3"/>
  </g>

  <!-- Calendar page 1 (purple, front) -->
  <g transform="translate(280, 36)">
    <rect x="0" y="0" width="160" height="180" rx="12" fill="#26215C" stroke="#7F77DD" stroke-width="1"/>
    <rect x="0" y="0" width="160" height="40" rx="12" fill="#534AB7"/>
    <rect x="0" y="28" width="160" height="12" fill="#534AB7"/>
    <circle cx="50" cy="4" r="6" fill="none" stroke="#AFA9EC" stroke-width="2"/>
    <circle cx="110" cy="4" r="6" fill="none" stroke="#AFA9EC" stroke-width="2"/>
    <circle cx="40" cy="72" r="5.5" fill="#534AB7" opacity="0.6"/>
    <circle cx="80" cy="72" r="5.5" fill="#534AB7" opacity="0.6"/>
    <circle cx="120" cy="72" r="5.5" fill="#534AB7" opacity="0.6"/>
    <circle cx="40" cy="102" r="5.5" fill="#534AB7" opacity="0.6"/>
    <circle cx="80" cy="102" r="5.5" fill="#AFA9EC"/>
    <circle cx="120" cy="102" r="5.5" fill="#534AB7" opacity="0.6"/>
    <circle cx="40" cy="132" r="5.5" fill="#534AB7" opacity="0.6"/>
    <circle cx="80" cy="132" r="5.5" fill="#534AB7" opacity="0.6"/>
    <circle cx="120" cy="132" r="5.5" fill="#534AB7" opacity="0.6"/>
    <circle cx="80" cy="102" r="12" fill="none" stroke="#AFA9EC" stroke-width="1.5"/>
  </g>

  <!-- Booking checkmark badge -->
  <g transform="translate(418, 170)">
    <circle cx="0" cy="0" r="22" fill="#1D9E75"/>
    <path d="M-10 0L-3 7L10 -6" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="340" y="278" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="28" font-weight="600" fill="#E8E6DF" letter-spacing="-0.5px">mein-kalender<tspan fill="#AFA9EC" font-weight="600">.link</tspan></text>

  <!-- Tagline -->
  <text x="340" y="308" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="400" fill="#888780" letter-spacing="2px">CONSOLIDATE · COPY · BOOK</text>
</svg>

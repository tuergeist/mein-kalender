<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- mein-kalender.link — Icon Only (App Icon / Favicon) -->

  <!-- Calendar page 3 (amber, back) -->
  <g transform="translate(48, 48)">
    <rect x="0" y="0" width="128" height="144" rx="14" fill="#FBBF24" opacity="0.4"/>
    <rect x="0" y="0" width="128" height="36" rx="14" fill="#D97706" opacity="0.45"/>
    <rect x="0" y="24" width="128" height="12" fill="#D97706" opacity="0.45"/>
  </g>

  <!-- Calendar page 2 (stone, middle) -->
  <g transform="translate(60, 36)">
    <rect x="0" y="0" width="128" height="144" rx="14" fill="#A8A29E" opacity="0.55"/>
    <rect x="0" y="0" width="128" height="36" rx="14" fill="#78716C" opacity="0.6"/>
    <rect x="0" y="24" width="128" height="12" fill="#78716C" opacity="0.6"/>
  </g>

  <!-- Calendar page 1 (rose, front) -->
  <g transform="translate(72, 24)">
    <rect x="0" y="0" width="128" height="144" rx="14" fill="#FFF1F2" stroke="#9F1239" stroke-width="1.5"/>
    <rect x="0" y="0" width="128" height="36" rx="14" fill="#9F1239"/>
    <rect x="0" y="24" width="128" height="12" fill="#9F1239"/>
    <!-- Binding rings -->
    <circle cx="40" cy="4" r="5" fill="none" stroke="#881337" stroke-width="2.5"/>
    <circle cx="88" cy="4" r="5" fill="none" stroke="#881337" stroke-width="2.5"/>
    <!-- Calendar grid -->
    <circle cx="32" cy="62" r="6" fill="#FDA4AF"/>
    <circle cx="64" cy="62" r="6" fill="#FDA4AF"/>
    <circle cx="96" cy="62" r="6" fill="#FDA4AF"/>
    <circle cx="32" cy="92" r="6" fill="#FDA4AF"/>
    <circle cx="64" cy="92" r="6" fill="#9F1239"/>
    <circle cx="96" cy="92" r="6" fill="#FDA4AF"/>
    <circle cx="32" cy="122" r="6" fill="#FDA4AF"/>
    <circle cx="64" cy="122" r="6" fill="#FDA4AF"/>
    <circle cx="96" cy="122" r="6" fill="#FDA4AF"/>

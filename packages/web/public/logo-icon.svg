<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- mein-kalender.link — Icon Only (App Icon / Favicon) -->

  <!-- Calendar page 3 (teal, back) -->
  <g transform="translate(48, 48)">
    <rect x="0" y="0" width="128" height="144" rx="14" fill="#5DCAA5" opacity="0.4"/>
    <rect x="0" y="0" width="128" height="36" rx="14" fill="#1D9E75" opacity="0.45"/>
    <rect x="0" y="24" width="128" height="12" fill="#1D9E75" opacity="0.45"/>
  </g>

  <!-- Calendar page 2 (blue, middle) -->

  <!-- Booking checkmark badge -->
  <g transform="translate(182, 140)">
    <circle cx="0" cy="0" r="24" fill="#D97706"/>
    <path d="M-11 0L-3.5 7.5L11 -6.5" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

<svg width="480" height="80" viewBox="0 0 480 80" xmlns="http://www.w3.org/2000/svg">
  <!-- mein-kalender.link — Horizontal Wordmark with Mini Icon -->

  <!-- Mini calendar stack -->
  <g transform="translate(12, 10)">
    <!-- Back page (amber) -->
    <rect x="0" y="8" width="44" height="50" rx="6" fill="#FBBF24" opacity="0.4"/>
    <rect x="0" y="8" width="44" height="14" rx="6" fill="#D97706" opacity="0.45"/>
    <rect x="0" y="17" width="44" height="5" fill="#D97706" opacity="0.45"/>
    <!-- Middle page (stone) -->
    <rect x="5" y="4" width="44" height="50" rx="6" fill="#A8A29E" opacity="0.55"/>
    <rect x="5" y="4" width="44" height="14" rx="6" fill="#78716C" opacity="0.6"/>
    <rect x="5" y="13" width="44" height="5" fill="#78716C" opacity="0.6"/>
    <!-- Front page (rose) -->
    <rect x="10" y="0" width="44" height="50" rx="6" fill="#FFF1F2" stroke="#9F1239" stroke-width="0.8"/>
    <rect x="10" y="0" width="44" height="14" rx="6" fill="#9F1239"/>
    <rect x="10" y="10" width="44" height="4" fill="#9F1239"/>
    <!-- Mini grid -->
    <circle cx="22" cy="24" r="2.5" fill="#FDA4AF"/>
    <circle cx="32" cy="24" r="2.5" fill="#FDA4AF"/>
    <circle cx="42" cy="24" r="2.5" fill="#FDA4AF"/>
    <circle cx="22" cy="34" r="2.5" fill="#FDA4AF"/>
    <circle cx="32" cy="34" r="2.5" fill="#9F1239"/>
    <circle cx="42" cy="34" r="2.5" fill="#FDA4AF"/>
    <circle cx="32" cy="34" r="5.5" fill="none" stroke="#881337" stroke-width="1"/>
  </g>

  <!-- Mini checkmark badge -->
  <g transform="translate(52, 48)">
    <circle cx="0" cy="0" r="9" fill="#D97706"/>
    <path d="M-4 0L-1.5 3L4.5 -2.5" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="80" y="48" font-family="'Satoshi', 'DM Sans', system-ui, sans-serif" font-size="26" font-weight="600" fill="#1C1917" letter-spacing="-0.5px">mein-kalender<tspan fill="#9F1239" font-weight="600">.link</tspan></text>
</svg>

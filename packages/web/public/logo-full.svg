<svg width="680" height="340" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
  <!-- mein-kalender.link — Full Logo (Light Background) -->

  <!-- Calendar page 3 (furthest back, amber) -->
  <g transform="translate(240, 60)">
    <rect x="0" y="0" width="160" height="180" rx="12" fill="#FBBF24" opacity="0.35"/>
    <rect x="0" y="0" width="160" height="40" rx="12" fill="#D97706" opacity="0.4"/>
    <rect x="0" y="28" width="160" height="12" fill="#D97706" opacity="0.4"/>
    <circle cx="40" cy="80" r="5" fill="#D97706" opacity="0.3"/>
    <circle cx="80" cy="80" r="5" fill="#D97706" opacity="0.3"/>
    <circle cx="120" cy="80" r="5" fill="#D97706" opacity="0.3"/>
    <circle cx="40" cy="110" r="5" fill="#D97706" opacity="0.3"/>
    <circle cx="80" cy="110" r="5" fill="#D97706" opacity="0.3"/>
  </g>

  <!-- Calendar page 2 (middle, stone) -->
  <g transform="translate(260, 48)">
    <rect x="0" y="0" width="160" height="180" rx="12" fill="#A8A29E" opacity="0.5"/>
    <rect x="0" y="0" width="160" height="40" rx="12" fill="#78716C" opacity="0.55"/>
    <rect x="0" y="28" width="160" height="12" fill="#78716C" opacity="0.55"/>
    <circle cx="40" cy="80" r="5" fill="#78716C" opacity="0.4"/>
    <circle cx="80" cy="80" r="5" fill="#78716C" opacity="0.4"/>
    <circle cx="120" cy="80" r="5" fill="#78716C" opacity="0.4"/>
    <circle cx="40" cy="110" r="5" fill="#78716C" opacity="0.4"/>
    <circle cx="80" cy="110" r="5" fill="#78716C" opacity="0.4"/>
    <circle cx="120" cy="110" r="5" fill="#78716C" opacity="0.4"/>
  </g>

  <!-- Calendar page 1 (front, rose — primary) -->
  <g transform="translate(280, 36)">
    <rect x="0" y="0" width="160" height="180" rx="12" fill="#FFF1F2" stroke="#9F1239" stroke-width="1"/>
    <rect x="0" y="0" width="160" height="40" rx="12" fill="#9F1239"/>
    <rect x="0" y="28" width="160" height="12" fill="#9F1239"/>
    <circle cx="50" cy="4" r="6" fill="none" stroke="#881337" stroke-width="2"/>
    <circle cx="110" cy="4" r="6" fill="none" stroke="#881337" stroke-width="2"/>
    <circle cx="40" cy="72" r="5.5" fill="#FDA4AF"/>
    <circle cx="80" cy="72" r="5.5" fill="#FDA4AF"/>
    <circle cx="120" cy="72" r="5.5" fill="#FDA4AF"/>
    <circle cx="40" cy="102" r="5.5" fill="#FDA4AF"/>
    <circle cx="80" cy="102" r="5.5" fill="#9F1239"/>
    <circle cx="120" cy="102" r="5.5" fill="#FDA4AF"/>
    <circle cx="40" cy="132" r="5.5" fill="#FDA4AF"/>
    <circle cx="80" cy="132" r="5.5" fill="#FDA4AF"/>
    <circle cx="120" cy="132" r="5.5" fill="#FDA4AF"/>
    <circle cx="80" cy="102" r="12" fill="none" stroke="#881337" stroke-width="1.5"/>
  </g>

  <!-- Booking checkmark badge -->
  <g transform="translate(418, 170)">
    <circle cx="0" cy="0" r="22" fill="#D97706"/>
    <path d="M-10 0L-3 7L10 -6" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="340" y="278" text-anchor="middle" font-family="'Satoshi', 'DM Sans', system-ui, sans-serif" font-size="28" font-weight="600" fill="#1C1917" letter-spacing="-0.5px">mein-kalender<tspan fill="#9F1239" font-weight="600">.link</tspan></text>

  <!-- Tagline -->
  <text x="340" y="308" text-anchor="middle" font-family="'Satoshi', 'DM Sans', system-ui, sans-serif" font-size="13" font-weight="400" fill="#78716C" letter-spacing="2px">CONSOLIDATE · COPY · BOOK</text>
</svg>

services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "4202:5432"
    environment:
      POSTGRES_USER: calendar_sync
      POSTGRES_PASSWORD: password
      POSTGRES_DB: calendar_sync
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendar_sync"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "4203:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
      target: runner-api
    environment:
      DATABASE_URL: postgresql://calendar_sync:password@postgres:5432/calendar_sync
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: dev-secret-change-in-production
      ENCRYPTION_SECRET: dev-encryption-key-change-me-32b
      SKIP_EMAIL_VERIFICATION: "true"
      GOOGLE_CALENDAR_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CALENDAR_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      MICROSOFT_CALENDAR_CLIENT_ID: ${MICROSOFT_CALENDAR_CLIENT_ID}
      MICROSOFT_CALENDAR_CLIENT_SECRET: ${MICROSOFT_CALENDAR_CLIENT_SECRET}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID}
      WEB_URL: ${WEB_URL:-http://localhost:4201}
      API_PORT: "4200"
      API_HOST: "0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  sync-worker:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
      target: runner-worker
    environment:
      DATABASE_URL: postgresql://calendar_sync:password@postgres:5432/calendar_sync
      REDIS_URL: redis://redis:6379
      ENCRYPTION_SECRET: dev-encryption-key-change-me-32b
      GOOGLE_CALENDAR_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CALENDAR_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      MICROSOFT_CALENDAR_CLIENT_ID: ${MICROSOFT_CALENDAR_CLIENT_ID}
      MICROSOFT_CALENDAR_CLIENT_SECRET: ${MICROSOFT_CALENDAR_CLIENT_SECRET}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:4201}
      NEXTAUTH_SECRET: dev-secret-change-in-production
      NEXT_PUBLIC_API_URL: http://localhost:4201
      NEXT_PUBLIC_MICROSOFT_CLIENT_ID: ${MICROSOFT_CALENDAR_CLIENT_ID}
      API_URL: http://api:4200
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CALENDAR_CLIENT_ID}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CALENDAR_CLIENT_SECRET}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-common}
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    ports:
      - "4201:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  redis_data:
